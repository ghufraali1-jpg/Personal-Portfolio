<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Syedghufran Ali</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
                <span class="text-teal me-2">SG</span> Syedghufran Ali
            </a>
            <button class="navbar-collapse-toggle d-lg-none border-0 bg-transparent text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="skills.html">Skills & Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="btn btn-teal ms-2" href="contact.html">Hire Me</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 my-4">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="text-teal fw-bold">Let's Work Together</h2>
                <p class="text-secondary">Have a project in mind or want to work together? Feel free to reach out!</p>
            </div>
            
            <div class="contact-box">
                <div class="row g-5">
                    <div class="col-lg-6">
                        <div class="map-container">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3604.5323281134267!2d68.3704221!3d25.3870104!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x394c70ee0f4c3a2f%3A0x6bfe7dcd926cfcf3!2sLabour%20Colony%20Hyderabad!5e0!3m2!1sen!2spk!4v1717510000000!5m2!1sen!2spk" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <form action="#" method="POST">
                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-bold">YOUR NAME</label>
                                <input type="text" class="form-control" required placeholder="John Doe">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-bold">YOUR EMAIL</label>
                                <input type="email" class="form-control" required placeholder="name@example.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary small fw-bold">YOUR MESSAGE</label>
                                <textarea class="form-control" rows="5" required placeholder="Tell me about your project..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-teal w-100 py-2">Send Message <i class="bi bi-send ms-1"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 mt-auto">
        <div class="container">
            <div class="row justify-content-between align-items-center g-4">
                <div class="col-md-4">
                    <p class="mb-0">&copy; 2026 Syedghufran Ali. All rights reserved.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <p class="mb-0">Made with <i class="bi bi-heart-fill text-danger mx-1"></i> using Bootstrap</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
